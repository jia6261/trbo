name: Deploy Pages and Publish Release

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '52 18 * * 2'

concurrency:
  group: "deploy-and-release"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 托管环境
    permissions:
      contents: write # 赋予创建 Release 和上传 zip 附件的写权限
      pages: write    # 赋予部署 Pages 网站的写权限
      id-token: write # 部署 Pages 所需的身份令牌权限
    steps:
    - name: Checkout self
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Checkout scratch-gui
      uses: actions/checkout@v4
      with:
        repository: TurboWarp/scratch-gui
        path: scratch-gui
        persist-credentials: false

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24 # 🚀 紧跟 2026 年新规，使用 Node 24 长期维护版

    # 🚀 新增步骤：紧跟 2026 年 6 月新规，锁定使用官方推荐的 Python 3.14 环境来安全运行 patch.py
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Build
      run: |
        cd scratch-gui
        npm ci
        NODE_ENV=production ROUTING_STYLE=hash npm run build

    - name: Patch
      run: python3 patch.py

    # 1. 全自动从你的远程 URL 下载所有 11 个 JS 文件到编译产物的指定目录中
    - name: Fetch and Inject JS Extensions
      run: |
        TARGET_DIR="./scratch-gui/build/static/extension-worker"
        mkdir -p "$TARGET_DIR"
        
        BASE_URL="https://raw.githubusercontent.com/jia6261/mirror-trbowrarp--extensions/refs/heads/main"
        
        FILES=(
          "files.js"
          "gamejolt.js"
          "gamepad.js"
          "iframe.js"
          "itchio.js"
          "local-storage.js"
          "navigator.js"
          "numerical-encoding-2.js"
          "penplus.js"
          "pointerlock.js"
          "example-extension.js"
        )
        
        for FILE in "${FILES[@]}"; do
          echo "Downloading $FILE..."
          curl -sL "$BASE_URL/$FILE" -o "$TARGET_DIR/$FILE"
        done

    # 2. 将注入了扩展文件以及经过 patch.py 处理后的完整 build 目录打包为 zip 压缩包
    - name: Create Zip Archive
      run: |
        cd scratch-gui/build
        zip -r ../../scratch-gui-release.zip .
        cd ../../

    # 3. 生成唯一的 Release 标签名字
    - name: Generate Tag Name
      id: tag
      run: echo "tag_name=v$(date +'%Y.%m.%d')-${{ github.run_id }}" >> $GITHUB_OUTPUT

    # 4. 发布 GitHub Release 并上传刚才做好的带有完整扩展和 patch 修复的 zip 文件
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        name: Release ${{ steps.tag.outputs.tag_name }}
        draft: false
        prerelease: false
        files: ./scratch-gui-release.zip

    # 5. 上传构建产物作为 GitHub Pages 的站点资源（网页和压缩包内容完全保持一致）
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./scratch-gui/build/
        retention-days: 30

  # 独立的部署任务：负责把 build 产生的网站内容正式发布到 GitHub Pages 网址上
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
